<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soren Soar</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.2);
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ea;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #050510;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .liquid-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1), inset 0 0 20px rgba(255, 255, 255, 0.05);
            border-radius: 16px;
        }
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .menu-container {
            padding: 40px 60px;
            text-align: center;
            pointer-events: auto;
            transition: opacity 0.3s ease;
        }
        h1 {
            color: #fff;
            font-size: 4rem;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue), 0 0 40px var(--neon-pink);
        }
        button {
            background: transparent;
            color: #fff;
            font-size: 1.5rem;
            padding: 15px 40px;
            border: 2px solid var(--neon-blue);
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2), inset 0 0 10px rgba(0, 243, 255, 0.2);
        }
        button:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 25px var(--neon-blue), inset 0 0 15px var(--neon-blue);
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            z-index: 5;
            display: none;
        }
        .progress-bar {
            width: 300px;
            height: 10px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--glass-border);
            border-radius: 5px;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink));
            box-shadow: 0 0 10px var(--neon-blue);
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    
    <div id="hud">
        <div class="liquid-glass" style="padding: 10px 20px;">
            <div style="color: #fff; font-weight: bold; letter-spacing: 1px;" id="level-display">LEVEL 1</div>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        </div>
    </div>

    <div id="ui-layer">
        <div id="main-menu" class="menu-container liquid-glass">
            <h1>Soren Soar</h1>
            <p style="color: #aaa; margin-bottom: 30px; letter-spacing: 1px;">HOLD TO FLY UP. RELEASE TO FALL.</p>
            <button id="btn-play">Initialize Sequence</button>
        </div>
        <div id="death-menu" class="menu-container liquid-glass hidden">
            <h1 style="color: #ff0055; text-shadow: 0 0 10px #ff0055;">CRITICAL FAILURE</h1>
            <button id="btn-restart">Reboot System</button>
        </div>
        <div id="win-menu" class="menu-container liquid-glass hidden">
            <h1 style="color: #00ff88; text-shadow: 0 0 10px #00ff88;">SECTOR CLEARED</h1>
            <button id="btn-next">Proceed</button>
        </div>
    </div>

<script>
/**
 * SOREN SOAR - CORE ENGINE
 * Architecture: Custom Entity Component System / State Machine
 */

// --- ENGINE CONSTANTS ---
const CONSTANTS = {
    GRAVITY: 1800,           
    THRUST: -3200,           
    MAX_VEL_Y: 800,          
    MIN_VEL_Y: -700,         
    SCROLL_SPEED: 450,       
    SHIP_SIZE: { w: 38, h: 26 }, 
    BLOCK_SIZE: 60,          
    PARTICLE_CAP: 300,
    CAMERA_OFFSET_X: 250     
};

// --- LEVEL DATA ARCHITECTURE ---
const LEVEL_DATA = [
    // Level 1: Introduction (Sparse)
    {
        bgColors: ['#0a001a', '#1a0033'],
        map: [
            "....................................................................................................W",
            "....................................................................................................W",
            "....................................................................................................W",
            ".......................................XXXXXX.......................................................W",
            ".......................................XXXXXX.......................................................W",
            ".......................................XXXXXX.......................................................W",
            "............XXXXX........................................XXXXXXX....................................W",
            ".........................................................XXXXXXX....................................W",
            ".........................................................XXXXXXX....................................W",
            "...........................XXXXX............................................XXXXXXX.................W",
            "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
        ]
    },
    // Level 2: Narrow Passages
    {
        bgColors: ['#001a0d', '#00331a'],
        map: [
            "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXW",
            "XXXXX.........XXXXXXX...................XXXXXXXXX....................XXXXX......................XXXXW",
            "XXXXX.........XXXXXXX...................XXXXXXXXX....................XXXXX......................XXXXW",
            "XXXXX.........XXXXXXX.........XXXXX.....XXXXXXXXX......XXXXXXX.......XXXXX......................XXXXW",
            "........XXX...................XXXXX....................XXXXXXX..................................XXXXW",
            "........XXX...................XXXXX....................XXXXXXX......................................W",
            "........XXX.........XXXXXXX.............XXX....................XXXXXXX..............................W",
            "XXXXXXXXXXXXXXXXX...XXXXXXX.............XXX....................XXXXXXX......................XXXXXXXXW",
            "XXXXXXXXXXXXXXXXX...XXXXXXX.............XXX....................XXXXXXX......................XXXXXXXXW",
            "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXW"
        ]
    },
    // Level 3: Sawblade Symphony (Simulated with isolated spikes)
    {
        bgColors: ['#1a0000', '#330000'],
        map: [
            "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXW",
            "...................XX.......................XX.......................XX...........................W",
            "...................XX.......................XX.......................XX...........................W",
            "......XX.......................XX.......................XX.......................XX...............W",
            "......XX.......................XX.......................XX.......................XX...............W",
            "...................XX.......................XX.......................XX...........................W",
            "...................XX.......................XX.......................XX...........................W",
            "......XX.......................XX.......................XX.......................XX...............W",
            "......XX.......................XX.......................XX.......................XX...............W",
            "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXW"
        ]
    },
    // Level 4: The Wave
    {
        bgColors: ['#000022', '#000044'],
        map: [
            "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXW",
            "XX.......XXXXX.......XXXXX.......XXXXX.......XXXXX.......XXXXX.......XXXXX.......XXXXX.......XXXXXXXW",
            "XXX.......XXXX.......XXXXX.......XXXXX.......XXXXX.......XXXXX.......XXXXX.......XXXXX.......XXXXXXXW",
            "XXXX.......XXX.......XXXXX.......XXXXX.......XXXXX.......XXXXX.......XXXXX.......XXXXX.......XXXXXXXW",
            "XXXXX.......XX.......XXXXX.......XXXXX.......XXXXX.......XXXXX.......XXXXX.......XXXXX.......XXXXXXXW",
            "XXXXXX.......X.......XXXXX.......XXXXX.......XXXXX.......XXXXX.......XXXXX.......XXXXX.......XXXXXXXW",
            "XXXXXXX..............XXXXX.......XXXXX.......XXXXX.......XXXXX.......XXXXX.......XXXXX.......XXXXXXXW",
            "XXXXXXXX.............XXXXX.......XXXXX.......XXXXX.......XXXXX.......XXXXX.......XXXXX.......XXXXXXXW",
            "XXXXXXXXX............XXXXX.......XXXXX.......XXXXX.......XXXXX.......XXXXX.......XXXXX.......XXXXXXXW",
            "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXW"
        ]
    },
    // Level 5: Marathon
    {
        bgColors: ['#110022', '#220044'],
        map: [
            "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXW",
            "XXXXX......XXXXX.......XX.......XX.......XXXXX.......XXXXX.......XX.......XX.......XXXXX.......XXXXX.......XX.......XX.......XXXXX.......XXXXXW",
            "XXXXX......XXXXX.......XX.......XX.......XXXXX.......XXXXX.......XX.......XX.......XXXXX.......XXXXX.......XX.......XX.......XXXXX.......XXXXXW",
            "XXXXX......XXXXX.......XX.......XX.......XXXXX.......XXXXX.......XX.......XX.......XXXXX.......XXXXX.......XX.......XX.......XXXXX.......XXXXXW",
            ".......XX.......XXXXX.......XX.......XXXXX.......XX.......XXXXX.......XX.......XXXXX.......XX.......XXXXX.......XX.......XXXXX.......XX.......W",
            ".......XX.......XXXXX.......XX.......XXXXX.......XX.......XXXXX.......XX.......XXXXX.......XX.......XXXXX.......XX.......XXXXX.......XX.......W",
            ".......XX.......XXXXX.......XX.......XXXXX.......XX.......XXXXX.......XX.......XXXXX.......XX.......XXXXX.......XX.......XXXXX.......XX.......W",
            "XXXXX......XXXXX.......XX.......XX.......XXXXX.......XXXXX.......XX.......XX.......XXXXX.......XXXXX.......XX.......XX.......XXXXX.......XXXXXW",
            "XXXXX......XXXXX.......XX.......XX.......XXXXX.......XXXXX.......XX.......XX.......XXXXX.......XXXXX.......XX.......XX.......XXXXX.......XXXXXW",
            "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXW"
        ]
    }
];

// --- UTILITIES ---
class Vector2 {
    constructor(x=0, y=0) { this.x = x; this.y = y; }
    add(v) { this.x += v.x; this.y += v.y; return this; }
    sub(v) { this.x -= v.x; this.y -= v.y; return this; }
    mult(n) { this.x *= n; this.y *= n; return this; }
    mag() { return Math.sqrt(this.x*this.x + this.y*this.y); }
    normalize() { let m = this.mag(); if(m!==0){ this.mult(1/m); } return this; }
}

class AABB {
    constructor(x, y, w, h) { this.x = x; this.y = y; this.w = w; this.h = h; }
    intersects(other) {
        return (this.x < other.x + other.w && this.x + this.w > other.x &&
                this.y < other.y + other.h && this.y + this.h > other.y);
    }
}

// --- PARTICLE SYSTEM ---
class Particle {
    constructor(x, y, vx, vy, life, color, size) {
        this.pos = new Vector2(x, y);
        this.vel = new Vector2(vx, vy);
        this.life = life;
        this.maxLife = life;
        this.color = color;
        this.size = size;
        this.active = true;
    }
    update(dt) {
        this.pos.add(new Vector2(this.vel.x * dt, this.vel.y * dt));
        this.life -= dt;
        if(this.life <= 0) this.active = false;
    }
    draw(ctx, camX) {
        if(!this.active) return;
        let alpha = Math.max(0, this.life / this.maxLife);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = this.color;
        let s = this.size * alpha;
        ctx.fillRect(this.pos.x - camX - s/2, this.pos.y - s/2, s, s);
        ctx.globalAlpha = 1.0;
    }
}

class ParticleSystem {
    constructor() {
        this.particles = [];
    }
    emit(x, y, vx, vy, life, color, size, count=1) {
        for(let i=0; i<count; i++) {
            if(this.particles.length < CONSTANTS.PARTICLE_CAP) {
                this.particles.push(new Particle(
                    x + (Math.random()-0.5)*10, 
                    y + (Math.random()-0.5)*10, 
                    vx + (Math.random()-0.5)*100, 
                    vy + (Math.random()-0.5)*100, 
                    life * (0.8 + Math.random()*0.4), 
                    color, 
                    size * (0.8 + Math.random()*0.4)
                ));
            }
        }
    }
    update(dt) {
        for(let i=this.particles.length-1; i>=0; i--) {
            this.particles[i].update(dt);
            if(!this.particles[i].active) this.particles.splice(i, 1);
        }
    }
    draw(ctx, camX) {
        for(let p of this.particles) p.draw(ctx, camX);
    }
    clear() { this.particles = []; }
}

// --- ENTITIES ---
class Player {
    constructor(x, y) {
        this.pos = new Vector2(x, y);
        this.vel = new Vector2(0, 0);
        this.size = CONSTANTS.SHIP_SIZE;
        this.rotation = 0;
        this.isThrusting = false;
        this.dead = false;
        this.won = false;
    }
    update(dt) {
        if(this.dead || this.won) return;

        this.vel.x = CONSTANTS.SCROLL_SPEED;

        if (this.isThrusting) {
            this.vel.y += CONSTANTS.THRUST * dt;
        } else {
            this.vel.y += CONSTANTS.GRAVITY * dt;
        }

        if (this.vel.y > CONSTANTS.MAX_VEL_Y) this.vel.y = CONSTANTS.MAX_VEL_Y;
        if (this.vel.y < CONSTANTS.MIN_VEL_Y) this.vel.y = CONSTANTS.MIN_VEL_Y;

        this.pos.x += this.vel.x * dt;
        this.pos.y += this.vel.y * dt;

        let targetRot = (this.vel.y / CONSTANTS.MAX_VEL_Y) * (Math.PI / 4);
        this.rotation += (targetRot - this.rotation) * 10 * dt;
    }
    draw(ctx, camX) {
        if(this.dead) return;
        ctx.save();
        ctx.translate(this.pos.x - camX, this.pos.y);
        ctx.rotate(this.rotation);
        
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00f3ff';
        
        ctx.fillStyle = '#00f3ff';
        ctx.beginPath();
        ctx.moveTo(this.size.w/2, 0);
        ctx.lineTo(-this.size.w/2, -this.size.h/2);
        ctx.lineTo(-this.size.w/4, 0);
        ctx.lineTo(-this.size.w/2, this.size.h/2);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(-this.size.w/4, -4, 8, 8);

        ctx.restore();
    }
    getCollider() {
        let padding = 4;
        return new AABB(this.pos.x - this.size.w/2 + padding, this.pos.y - this.size.h/2 + padding, this.size.w - padding*2, this.size.h - padding*2);
    }
}

class Block {
    constructor(x, y, type) {
        this.pos = new Vector2(x, y);
        this.size = CONSTANTS.BLOCK_SIZE;
        this.type = type; // 'X' = solid, 'W' = win
    }
    draw(ctx, camX) {
        let screenX = this.pos.x - camX;
        if(screenX < -this.size || screenX > window.innerWidth) return;
        
        if (this.type === 'X') {
            ctx.fillStyle = 'rgba(20, 20, 25, 0.9)';
            ctx.strokeStyle = '#ff00ea';
            ctx.lineWidth = 2;
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff00ea';
            ctx.fillRect(screenX, this.pos.y, this.size, this.size);
            ctx.strokeRect(screenX, this.pos.y, this.size, this.size);
            ctx.shadowBlur = 0;
        } else if (this.type === 'W') {
            ctx.fillStyle = 'rgba(0, 255, 136, 0.3)';
            ctx.fillRect(screenX, this.pos.y, this.size, this.size);
        }
    }
    getCollider() {
        return new AABB(this.pos.x, this.pos.y, this.size, this.size);
    }
}

// --- RENDERING & BACKGROUND ---
class ParallaxBackground {
    constructor(colors) {
        this.layers = [
            { speed: 0.1, color: colors[0], nodes: [] },
            { speed: 0.3, color: colors[1], nodes: [] },
            { speed: 0.6, color: 'rgba(0, 243, 255, 0.1)', nodes: [] }
        ];
        this.generateNodes();
    }
    generateNodes() {
        for(let layer of this.layers) {
            for(let i=0; i<50; i++) {
                layer.nodes.push({
                    x: Math.random() * 5000,
                    y: Math.random() * window.innerHeight,
                    s: Math.random() * 100 + 50
                });
            }
        }
    }
    draw(ctx, camX) {
        for(let layer of this.layers) {
            ctx.fillStyle = layer.color;
            for(let node of layer.nodes) {
                let x = (node.x - camX * layer.speed) % 5000;
                if(x < -200) x += 5000;
                ctx.fillRect(x, node.y, node.s, node.s);
            }
        }
    }
}

// --- GAME STATE MANAGER ---
class GameManager {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d', { alpha: false });
        this.resize();
        window.addEventListener('resize', () => this.resize());

        this.state = 'MENU'; 
        this.currentLevelIdx = 0;
        
        this.lastTime = 0;
        this.cameraX = 0;
        this.levelEndX = 0;

        this.particles = new ParticleSystem();
        this.player = null;
        this.blocks = [];
        this.bg = null;

        this.setupInputs();
        this.setupUI();

        requestAnimationFrame((t) => this.loop(t));
    }

    resize() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
    }

    setupInputs() {
        const handleDown = (e) => {
            if(e.type==='mousedown' && e.button!==0) return;
            if(this.state === 'PLAYING' && this.player) this.player.isThrusting = true;
        };
        const handleUp = () => {
            if(this.state === 'PLAYING' && this.player) this.player.isThrusting = false;
        };
        
        window.addEventListener('mousedown', handleDown);
        window.addEventListener('touchstart', handleDown, {passive: false});
        window.addEventListener('keydown', (e) => { if(e.code==='Space') handleDown(e); });

        window.addEventListener('mouseup', handleUp);
        window.addEventListener('touchend', handleUp);
        window.addEventListener('keyup', (e) => { if(e.code==='Space') handleUp(); });
    }

    setupUI() {
        document.getElementById('btn-play').addEventListener('click', () => this.loadLevel(this.currentLevelIdx));
        document.getElementById('btn-restart').addEventListener('click', () => this.loadLevel(this.currentLevelIdx));
        document.getElementById('btn-next').addEventListener('click', () => {
            this.currentLevelIdx = (this.currentLevelIdx + 1) % LEVEL_DATA.length;
            this.loadLevel(this.currentLevelIdx);
        });
    }

    showUI(id) {
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('death-menu').classList.add('hidden');
        document.getElementById('win-menu').classList.add('hidden');
        if(id) document.getElementById(id).classList.remove('hidden');
        
        if(id === null) document.getElementById('hud').style.display = 'block';
        else document.getElementById('hud').style.display = 'none';
    }

    loadLevel(index) {
        let data = LEVEL_DATA[index];
        this.blocks = [];
        this.particles.clear();
        this.bg = new ParallaxBackground(data.bgColors);
        
        let startY = window.innerHeight / 2;
        let mapWidth = 0;

        let mapH = data.map.length;
        let mapW = data.map[0].length;
        let blockS = CONSTANTS.BLOCK_SIZE;
        let offsetY = (window.innerHeight - (mapH * blockS)) / 2;

        for(let r=0; r<mapH; r++) {
            for(let c=0; c<mapW; c++) {
                let char = data.map[r][c];
                if(char === 'X' || char === 'W') {
                    this.blocks.push(new Block(c * blockS, offsetY + r * blockS, char));
                }
            }
        }
        
        this.levelEndX = mapW * blockS;
        this.player = new Player(0, startY);
        this.cameraX = -CONSTANTS.CAMERA_OFFSET_X;
        this.state = 'PLAYING';
        
        document.getElementById('level-display').innerText = `LEVEL ${index + 1}`;
        this.showUI(null);
    }

    triggerDeath() {
        this.state = 'DEAD';
        this.player.dead = true;
        this.particles.emit(this.player.pos.x, this.player.pos.y, 0, 0, 1.5, '#ff00ea', 10, 50);
        this.particles.emit(this.player.pos.x, this.player.pos.y, 0, 0, 1.0, '#ffffff', 5, 30);
        setTimeout(() => this.showUI('death-menu'), 1000);
    }

    triggerWin() {
        this.state = 'WON';
        this.player.won = true;
        this.player.isThrusting = false;
        setTimeout(() => this.showUI('win-menu'), 1000);
    }

    updatePhysics(dt) {
        if(this.state !== 'PLAYING') return;

        this.player.update(dt);
        this.cameraX = this.player.pos.x - CONSTANTS.CAMERA_OFFSET_X;

        if (this.player.isThrusting) {
            this.particles.emit(
                this.player.pos.x - this.player.size.w/2, 
                this.player.pos.y + 5, 
                -CONSTANTS.SCROLL_SPEED * 0.8, 
                this.player.vel.y * 0.5, 
                0.3, 
                '#00f3ff', 
                6, 
                2
            );
        }

        if (this.player.pos.y < 0 || this.player.pos.y > window.innerHeight) {
            this.triggerDeath();
            return;
        }

        let pCol = this.player.getCollider();
        for(let b of this.blocks) {
            if(b.pos.x > this.cameraX + window.innerWidth || b.pos.x + b.size < this.cameraX) continue;
            
            if(pCol.intersects(b.getCollider())) {
                if(b.type === 'X') {
                    this.triggerDeath();
                    break;
                } else if(b.type === 'W') {
                    this.triggerWin();
                    break;
                }
            }
        }

        let progress = Math.max(0, Math.min(100, (this.player.pos.x / this.levelEndX) * 100));
        document.getElementById('progress-fill').style.width = progress + '%';
    }

    render() {
        this.ctx.fillStyle = '#050510';
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

        if(this.bg) this.bg.draw(this.ctx, this.cameraX);

        for(let b of this.blocks) b.draw(this.ctx, this.cameraX);
        
        this.particles.draw(this.ctx, this.cameraX);
        if(this.player) this.player.draw(this.ctx, this.cameraX);
    }

    loop(timestamp) {
        let dt = (timestamp - this.lastTime) / 1000;
        this.lastTime = timestamp;
        if(dt > 0.1) dt = 0.1; 

        if(this.state === 'PLAYING' || this.state === 'DEAD' || this.state === 'WON') {
            if(this.state === 'PLAYING') this.updatePhysics(dt);
            this.particles.update(dt);
            this.render();
        }

        requestAnimationFrame((t) => this.loop(t));
    }
}

window.onload = () => {
    new GameManager();
};
</script>
</body>
</html>
