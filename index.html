<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soren Soar - Geometry Engine v5.0</title>
    <style>
        /* ====================================================================================================
           CORE STYLESHEET - GD AUTHENTIC UI
           ==================================================================================================== */
        @font-face {
            font-family: 'Pusab';
            src: local('Arial Black'), local('Impact');
        }

        :root {
            --gd-blue: #0055ff;
            --gd-ground: #002288;
            --gd-yellow: #ffff00;
            --gd-green: #00ff00;
            --text-stroke: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
            --shadow-drop: 4px 4px 0px rgba(0,0,0,0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
            font-family: 'Pusab', 'Arial Black', sans-serif;
            color: #fff;
        }

        #game-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        /* ----------------------------------------------------------------------------------------------------
           CANVAS LAYERS
           ---------------------------------------------------------------------------------------------------- */
        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            image-rendering: pixelated;
        }

        /* ----------------------------------------------------------------------------------------------------
           USER INTERFACE
           ---------------------------------------------------------------------------------------------------- */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            overflow: hidden;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease;
        }

        .screen.active {
            opacity: 1;
            visibility: visible;
        }

        /* MENU SPECIFICS */
        .title-text {
            font-size: 6vw;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: var(--text-stroke), var(--shadow-drop);
            margin-bottom: 40px;
            text-align: center;
            background: linear-gradient(180deg, #ffffff 0%, #dddddd 50%, #aaaaaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.8));
        }

        /* LEVEL SELECT CAROUSEL */
        .level-select-container {
            width: 80%;
            max-width: 800px;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 5rem;
            cursor: pointer;
            text-shadow: var(--text-stroke);
            transition: transform 0.1s;
        }

        .nav-btn:active { transform: scale(0.8); }
        .nav-btn:hover { color: var(--gd-yellow); }

        .level-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.4);
            border: 4px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 30px;
            margin: 0 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 10px 20px rgba(0,0,0,0.5);
        }

        .level-name {
            font-size: 3rem;
            color: #fff;
            text-shadow: var(--text-stroke);
            margin-bottom: 10px;
            text-align: center;
        }

        .level-difficulty {
            font-size: 1.5rem;
            color: var(--gd-yellow);
            text-shadow: var(--text-stroke);
            margin-bottom: 30px;
        }

        .btn-play {
            background: var(--gd-green);
            color: #fff;
            font-family: 'Pusab', 'Arial Black', sans-serif;
            font-size: 2.5rem;
            padding: 15px 50px;
            border: 4px solid #005500;
            border-radius: 15px;
            cursor: pointer;
            text-shadow: var(--text-stroke);
            box-shadow: inset 0 5px 0px rgba(255,255,255,0.4), inset 0 -5px 0px rgba(0,0,0,0.3), 0 10px 10px rgba(0,0,0,0.5);
            transition: transform 0.1s, filter 0.1s;
        }

        .btn-play:active {
            transform: translateY(5px);
            box-shadow: inset 0 2px 0px rgba(255,255,255,0.4), inset 0 -2px 0px rgba(0,0,0,0.3), 0 5px 5px rgba(0,0,0,0.5);
        }

        .btn-play:hover {
            filter: brightness(1.2);
        }

        /* HUD */
        #hud-screen {
            pointer-events: none;
            justify-content: flex-start;
            padding-top: 20px;
        }

        .progress-wrap {
            width: 60%;
            max-width: 500px;
            height: 18px;
            background: rgba(0,0,0,0.6);
            border: 3px solid #fff;
            border-radius: 10px;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--gd-green);
            box-shadow: inset 0 5px 0 rgba(255,255,255,0.5);
            transition: width 0.1s linear;
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1rem;
            color: #fff;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }

        .attempt-counter {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            color: rgba(255,255,255,0.5);
            text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
            animation: fadeOut 3s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* PAUSE / DEATH / WIN SCREENS */
        .overlay-card {
            background: rgba(0,0,0,0.8);
            border: 4px solid #fff;
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        .overlay-title {
            font-size: 4rem;
            margin-bottom: 30px;
            text-shadow: var(--text-stroke);
        }

        .btn-action {
            background: #ffaa00;
            color: #fff;
            font-family: inherit;
            font-size: 2rem;
            padding: 15px 40px;
            margin: 10px;
            border: 4px solid #884400;
            border-radius: 10px;
            cursor: pointer;
            text-shadow: var(--text-stroke);
            box-shadow: inset 0 4px 0 rgba(255,255,255,0.4), inset 0 -4px 0 rgba(0,0,0,0.3);
        }
        .btn-action:hover { filter: brightness(1.1); }
        .btn-action:active { transform: scale(0.95); }

    </style>
</head>

/* ====================================================================================================
   3. MATH & GEOMETRY UTILS
   ==================================================================================================== */
class MathUtils {
    static lerp(start, end, amt) {
        return (1 - amt) * start + amt * end;
    }
    static clamp(val, min, max) {
        return Math.min(Math.max(val, min), max);
    }
    static map(n, start1, stop1, start2, stop2) {
        return ((n - start1) / (stop1 - start1)) * (stop2 - start2) + start2;
    }
}

class AABB {
    constructor(x, y, w, h) {
        this.x = x; this.y = y; this.w = w; this.h = h;
    }
    intersects(other) {
        return (this.x < other.x + other.w && this.x + this.w > other.x &&
                this.y < other.y + other.h && this.y + this.h > other.y);
    }
}

/* ====================================================================================================
   4. PARTICLE ENGINE
   ==================================================================================================== */
class Particle {
    constructor() {
        this.active = false;
        this.x = 0; this.y = 0;
        this.vx = 0; this.vy = 0;
        this.life = 0; this.maxLife = 1;
        this.size = 0; this.startSize = 0;
        this.color = '#fff';
        this.type = 0; // 0: square, 1: trail circle
    }
    spawn(x, y, vx, vy, life, size, color, type) {
        this.x = x; this.y = y;
        this.vx = vx; this.vy = vy;
        this.life = life; this.maxLife = life;
        this.size = size; this.startSize = size;
        this.color = color; this.type = type;
        this.active = true;
    }
    update(dt) {
        if (!this.active) return;
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.life -= dt;
        if (this.life <= 0) {
            this.active = false;
        } else {
            this.size = this.startSize * (this.life / this.maxLife);
        }
    }
    draw(ctx, camX) {
        if (!this.active) return;
        let screenX = this.x - camX;
        if (screenX < -20 || screenX > window.innerWidth + 20) return;

        ctx.globalAlpha = this.life / this.maxLife;
        ctx.fillStyle = this.color;
        
        if (this.type === 0) { // Square
            ctx.fillRect(screenX - this.size/2, this.y - this.size/2, this.size, this.size);
        } else { // Circle
            ctx.beginPath();
            ctx.arc(screenX, this.y, this.size/2, 0, Math.PI*2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    }
}

class ParticleSystem {
    constructor(maxParticles = 1000) {
        this.particles = Array.from({length: maxParticles}, () => new Particle());
        this.idx = 0;
    }
    emit(x, y, vx, vy, life, size, color, type) {
        let p = this.particles[this.idx];
        p.spawn(x, y, vx, vy, life, size, color, type);
        this.idx = (this.idx + 1) % this.particles.length;
    }
    burst(x, y, count, speed, life, size, color) {
        for(let i=0; i<count; i++) {
            let angle = Math.random() * Math.PI * 2;
            let vel = Math.random() * speed;
            this.emit(x, y, Math.cos(angle)*vel, Math.sin(angle)*vel, life*(0.5+Math.random()*0.5), size, color, 0);
        }
    }
    update(dt) {
        for(let p of this.particles) p.update(dt);
    }
    draw(ctx, camX) {
        for(let p of this.particles) p.draw(ctx, camX);
    }
    clear() {
        for(let p of this.particles) p.active = false;
    }
}

/* ====================================================================================================
   5. ENTITIES (Player, Blocks, Spikes)
   ==================================================================================================== */
class Player {
    constructor() {
        this.reset();
        this.trail = [];
    }
    
    reset(y = window.innerHeight/2) {
        this.x = 0;
        this.y = y;
        this.vy = 0;
        this.rot = 0;
        this.w = CFG.PLAYER.WIDTH;
        this.h = CFG.PLAYER.HEIGHT;
        this.thrusting = false;
        this.dead = false;
        this.won = false;
        this.trail = [];
        this.jumps = 0;
        this.distance = 0;
    }

    getHitbox() {
        let pad = CFG.PLAYER.HITBOX_PAD;
        return new AABB(this.x - this.w/2 + pad, this.y - this.h/2 + pad, this.w - pad*2, this.h - pad*2);
    }

    update(dt, groundY) {
        if (this.dead || this.won) return;

        // Apply Forces
        if (this.thrusting) {
            this.vy += CFG.PHYSICS.THRUST * dt;
        } else {
            this.vy += CFG.PHYSICS.GRAVITY * dt;
        }

        // Terminal Velocity
        this.vy = MathUtils.clamp(this.vy, CFG.PHYSICS.TERM_VEL_RISE, CFG.PHYSICS.TERM_VEL_FALL);

        // Move
        this.x += CFG.PHYSICS.SCROLL_SPEED * dt;
        this.y += this.vy * dt;
        this.distance = this.x;

        // Rotation (Pitch)
        let velRatio = this.vy / CFG.PHYSICS.TERM_VEL_FALL;
        let targetRot = velRatio * CFG.PLAYER.MAX_ROT;
        this.rot += (targetRot - this.rot) * CFG.PLAYER.ROT_SPEED * dt;

        // Constraints
        let halfH = this.h / 2;
        if (this.y - halfH < CFG.PHYSICS.ROOF_Y) {
            this.y = CFG.PHYSICS.ROOF_Y + halfH;
            this.vy = 0;
            this.rot = 0;
        }
        if (this.y + halfH > groundY) {
            this.y = groundY - halfH;
            this.vy = 0;
            this.rot = 0;
        }

        // Trail recording
        this.trail.unshift({x: this.x, y: this.y});
        if (this.trail.length > 20) this.trail.pop();
    }

    draw(ctx, camX) {
        if (this.dead) return;
        let screenX = this.x - camX;

        // Draw Trail (Ghost effect)
        if (this.trail.length > 1) {
            ctx.beginPath();
            ctx.moveTo(this.trail[0].x - camX, this.trail[0].y);
            for (let i = 1; i < this.trail.length; i++) {
                ctx.lineTo(this.trail[i].x - camX, this.trail[i].y);
            }
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = this.h * 0.6;
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        ctx.save();
        ctx.translate(screenX, this.y);
        ctx.rotate(this.rot);

        // --- GD Ship Drawing ---
        // Black Outline
        ctx.fillStyle = '#000';
        ctx.fillRect(-this.w/2 - 2, -this.h/2 - 2, this.w + 4, this.h + 4);

        // White Inner Outline
        ctx.fillStyle = CFG.COLORS.OUTLINE;
        ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);

        // Main Color Hull
        ctx.fillStyle = CFG.COLORS.PLAYER_MAIN;
        ctx.fillRect(-this.w/2 + 2, -this.h/2 + 2, this.w - 4, this.h - 4);

        // Secondary Color Details (Stripes)
        ctx.fillStyle = CFG.COLORS.PLAYER_SEC;
        ctx.fillRect(-this.w/4, -this.h/2 + 2, this.w/2, this.h - 4);

        // Cockpit Window
        ctx.fillStyle = '#00ffff'; // Glass color
        ctx.fillRect(this.w/4 - 4, -this.h/4, 8, this.h/2);

        // Engine Port
        ctx.fillStyle = '#222';
        ctx.fillRect(-this.w/2 - 6, -this.h/4, 8, this.h/2);

        ctx.restore();
    }
}

class Entity {
    constructor(type, x, y, size) {
        this.type = type; 
        this.x = x; this.y = y; this.size = size;
        
        // Define specific hitboxes based on type
        if (type === 'X' || type === 'S' || type === 'E') {
            let h = (type === 'S') ? size/2 : size;
            let yOffset = (type === 'S') ? size/2 : 0;
            this.aabb = new AABB(x, y + yOffset, size, h);
            if(type === 'E') this.aabb = new AABB(x, 0, size, window.innerHeight);
        } else {
            // Spikes - smaller hitbox
            let pad = size * 0.25;
            this.aabb = new AABB(x + pad, y + pad, size - pad*2, size - pad*2);
        }
    }

    draw(ctx, camX) {
        let screenX = this.x - camX;
        if (screenX < -this.size || screenX > window.innerWidth) return;

        ctx.save();
        ctx.translate(screenX, this.y);

        if (this.type === 'X') {
            // Standard Block
            ctx.fillStyle = '#000'; // Black border
            ctx.fillRect(0, 0, this.size, this.size);
            
            ctx.fillStyle = '#fff'; // White inner border
            ctx.fillRect(2, 2, this.size-4, this.size-4);
            
            ctx.fillStyle = CFG.COLORS.PLAYER_SEC; // Block core color
            ctx.fillRect(4, 4, this.size-8, this.size-8);

            // Corner dots
            ctx.fillStyle = '#000';
            ctx.fillRect(6, 6, 4, 4);
            ctx.fillRect(this.size-10, 6, 4, 4);
            ctx.fillRect(6, this.size-10, 4, 4);
            ctx.fillRect(this.size-10, this.size-10, 4, 4);

        } else if (this.type === 'S') {
            // Slab (Half block)
            ctx.fillStyle = '#000';
            ctx.fillRect(0, this.size/2, this.size, this.size/2);
            ctx.fillStyle = '#fff';
            ctx.fillRect(2, this.size/2 + 2, this.size-4, this.size/2 - 4);
            ctx.fillStyle = CFG.COLORS.PLAYER_SEC;
            ctx.fillRect(4, this.size/2 + 4, this.size-8, this.size/2 - 8);

        } else if (['^', 'v', '<', '>'].includes(this.type)) {
            // Spike Drawing
            ctx.fillStyle = CFG.COLORS.SPIKE_TIP;
            ctx.beginPath();
            
            if (this.type === '^') {
                ctx.moveTo(this.size/2, 0); ctx.lineTo(this.size, this.size); ctx.lineTo(0, this.size);
            } else if (this.type === 'v') {
                ctx.moveTo(this.size/2, this.size); ctx.lineTo(this.size, 0); ctx.lineTo(0, 0);
            } else if (this.type === '>') {
                ctx.moveTo(this.size, this.size/2); ctx.lineTo(0, 0); ctx.lineTo(0, this.size);
            } else if (this.type === '<') {
                ctx.moveTo(0, this.size/2); ctx.lineTo(this.size, 0); ctx.lineTo(this.size, this.size);
            }
            ctx.fill();

            // Inner dark spike
            ctx.fillStyle = CFG.COLORS.SPIKE_BASE;
            ctx.beginPath();
            let p = 6; // padding
            if (this.type === '^') {
                ctx.moveTo(this.size/2, p*2); ctx.lineTo(this.size-p, this.size-p); ctx.lineTo(p, this.size-p);
            } else if (this.type === 'v') {
                ctx.moveTo(this.size/2, this.size-p*2); ctx.lineTo(this.size-p, p); ctx.lineTo(p, p);
            } else if (this.type === '>') {
                ctx.moveTo(this.size-p*2, this.size/2); ctx.lineTo(p, p); ctx.lineTo(p, this.size-p);
            } else if (this.type === '<') {
                ctx.moveTo(p*2, this.size/2); ctx.lineTo(this.size-p, p); ctx.lineTo(this.size-p, this.size-p);
            }
            ctx.fill();
        } else if (this.type === 'E') {
            // End Wall
            ctx.fillStyle = 'rgba(0, 255, 0, 0.3)';
            ctx.fillRect(0, -window.innerHeight, this.size, window.innerHeight*2);
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(this.size/2, -window.innerHeight);
            ctx.lineTo(this.size/2, window.innerHeight);
            ctx.stroke();
        }

        ctx.restore();
    }
}

/* ====================================================================================================
   6. LEVEL & BACKGROUND MANAGER
   ==================================================================================================== */
class WorldManager {
    constructor() {
        this.entities = [];
        this.levelLength = 0;
        this.groundY = 0;
        this.bgColor = '#000';
        this.groundColor = '#000';
        this.gridSize = CFG.WORLD.BLOCK_SIZE;
    }

    load(index) {
        this.entities = [];
        let data = LEVEL_DATABASE[index];
        this.bgColor = data.bgColor;
        this.groundColor = data.groundColor;

        let mapH = data.layout.length * this.gridSize;
        this.groundY = window.innerHeight - CFG.WORLD.GROUND_HEIGHT;
        let startY = this.groundY - mapH; // Bottom align the layout to the ground

        let maxX = 0;
        for (let r = 0; r < data.layout.length; r++) {
            for (let c = 0; c < data.layout[r].length; c++) {
                let char = data.layout[r][c];
                let x = c * this.gridSize;
                let y = startY + r * this.gridSize;
                
                if (char !== '.') {
                    this.entities.push(new Entity(char, x, y, this.gridSize));
                    if (x > maxX) maxX = x;
                }
            }
        }
        this.levelLength = maxX;
    }

    drawBackground(ctx, camX) {
        // Main BG
        ctx.fillStyle = this.bgColor;
        ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

        // Faint Grid (parallax 0.5)
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
        ctx.lineWidth = 2;
        let gOffsetX = (camX * 0.5) % this.gridSize;
        for(let x = -gOffsetX; x < window.innerWidth; x += this.gridSize) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, this.groundY); ctx.stroke();
        }
        for(let y = this.groundY % this.gridSize; y > 0; y -= this.gridSize) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(window.innerWidth, y); ctx.stroke();
        }

        // Entities
        for(let e of this.entities) e.draw(ctx, camX);

        // Ground
        ctx.fillStyle = this.groundColor;
        ctx.fillRect(0, this.groundY, window.innerWidth, window.innerHeight - this.groundY);
        
        // Ground Line
        ctx.fillStyle = CFG.COLORS.LINE;
        ctx.fillRect(0, this.groundY - 4, window.innerWidth, 4);

        // Ground Pattern (Scrolling fast)
        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        let groundOffsetX = camX % this.gridSize;
        for(let x = -groundOffsetX; x < window.innerWidth; x += this.gridSize) {
            ctx.strokeRect(x, this.groundY, this.gridSize, this.gridSize);
        }
    }
}

/* ====================================================================================================
   7. MAIN ENGINE & UI
   ==================================================================================================== */
class Engine {
    constructor() {
        this.canvas = document.getElementById('game-canvas');
        this.ctx = this.canvas.getContext('2d', { alpha: false });
        
        this.world = new WorldManager();
        this.player = new Player();
        this.particles = new ParticleSystem(1500);
        
        this.state = 'MENU'; // MENU, PLAYING, PAUSED, DEAD, WON
        this.camX = 0;
        this.attempts = 1;
        this.currentLevelIdx = 0;
        
        this.lastTime = performance.now();
        this.accumulator = 0;

        this.initDOM();
        this.resize();
        window.addEventListener('resize', () => this.resize());
        this.setupInputs();

        this.updateMenuUI();
        requestAnimationFrame((t) => this.loop(t));
    }

    initDOM() {
        this.ui = {
            menu: document.getElementById('screen-menu'),
            hud: document.getElementById('screen-hud'),
            death: document.getElementById('screen-death'),
            win: document.getElementById('screen-win'),
            pause: document.getElementById('screen-pause'),
            bar: document.getElementById('hud-bar'),
            pct: document.getElementById('hud-pct'),
            attempt: document.getElementById('hud-attempt'),
            lvlName: document.getElementById('menu-level-name'),
            lvlDiff: document.getElementById('menu-level-diff'),
            winStats: document.getElementById('win-stats')
        };

        document.getElementById('btn-prev').onclick = () => this.changeLevel(-1);
        document.getElementById('btn-next').onclick = () => this.changeLevel(1);
        document.getElementById('btn-start').onclick = () => this.startLevel();
        document.getElementById('btn-resume').onclick = () => this.togglePause();
        document.getElementById('btn-menu-pause').onclick = () => this.goMenu();
        document.getElementById('btn-menu-win').onclick = () => this.goMenu();
        document.getElementById('btn-next-level').onclick = () => {
            this.currentLevelIdx = (this.currentLevelIdx + 1) % LEVEL_DATABASE.length;
            this.startLevel();
        };
    }

    resize() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
    }

    setScreen(screenObj) {
        Object.values(this.ui).forEach(el => {
            if(el.classList && el.classList.contains('screen')) el.classList.remove('active');
        });
        if(screenObj) screenObj.classList.add('active');
    }

    changeLevel(dir) {
        this.currentLevelIdx += dir;
        if(this.currentLevelIdx < 0) this.currentLevelIdx = LEVEL_DATABASE.length - 1;
        if(this.currentLevelIdx >= LEVEL_DATABASE.length) this.currentLevelIdx = 0;
        this.updateMenuUI();
    }

    updateMenuUI() {
        let d = LEVEL_DATABASE[this.currentLevelIdx];
        this.ui.lvlName.innerText = d.name;
        this.ui.lvlDiff.innerText = `${d.difficulty} ${this.currentLevelIdx + 1}`;
        this.ui.menu.style.background = `radial-gradient(circle, ${d.bgColor} 0%, #000 100%)`;
    }

    goMenu() {
        this.state = 'MENU';
        this.setScreen(this.ui.menu);
        this.updateMenuUI();
    }

    startLevel() {
        this.attempts = 1;
        this.resetRun();
    }

    resetRun() {
        this.world.load(this.currentLevelIdx);
        this.player.reset(this.world.groundY - 100);
        this.camX = this.player.x - CFG.WORLD.CAMERA_OFFSET_X;
        this.particles.clear();
        this.state = 'PLAYING';
        this.setScreen(this.ui.hud);
        
        // Re-trigger animation
        this.ui.attempt.innerText = `ATTEMPT ${this.attempts}`;
        this.ui.attempt.style.animation = 'none';
        void this.ui.attempt.offsetWidth; // trigger reflow
        this.ui.attempt.style.animation = 'fadeOut 3s forwards';
    }

    setupInputs() {
        const handleDown = (e) => {
            if(e.target.tagName === 'BUTTON') return; // Prevent double trigger
            if(this.state === 'PLAYING') {
                this.player.thrusting = true;
            } else if (this.state === 'DEAD') {
                this.attempts++;
                this.resetRun();
            }
        };
        const handleUp = () => { this.player.thrusting = false; };

        window.addEventListener('mousedown', handleDown);
        window.addEventListener('touchstart', (e) => {
            if(e.target.tagName !== 'BUTTON') e.preventDefault();
            handleDown(e);
        }, {passive: false});
        window.addEventListener('mouseup', handleUp);
        window.addEventListener('touchend', handleUp);

        window.addEventListener('keydown', (e) => {
            if(e.code === 'Space' || e.code === 'ArrowUp') handleDown(e);
            if(e.code === 'Escape' && this.state === 'PLAYING') this.togglePause();
        });
        window.addEventListener('keyup', (e) => {
            if(e.code === 'Space' || e.code === 'ArrowUp') handleUp();
        });
    }

    togglePause() {
        if(this.state === 'PLAYING') {
            this.state = 'PAUSED';
            this.setScreen(this.ui.pause);
        } else if (this.state === 'PAUSED') {
            this.state = 'PLAYING';
            this.setScreen(this.ui.hud);
        }
    }

    die() {
        this.state = 'DEAD';
        this.player.dead = true;
        this.setScreen(this.ui.death);
        
        // GD Explosion
        this.particles.burst(this.player.x, this.player.y, 80, 1000, 1.5, 20, CFG.COLORS.PLAYER_MAIN);
        this.particles.burst(this.player.x, this.player.y, 80, 800, 1.2, 15, CFG.COLORS.PLAYER_SEC);
        this.particles.burst(this.player.x, this.player.y, 50, 400, 1.0, 10, '#ffffff');
    }

    win() {
        this.state = 'WON';
        this.player.won = true;
        this.ui.winStats.innerHTML = `ATTEMPTS: ${this.attempts}<br>DISTANCE: ${Math.floor(this.player.distance)}`;
        this.setScreen(this.ui.win);
    }

    checkCollisions() {
        let pBox = this.player.getHitbox();
        for (let e of this.world.entities) {
            // Broadphase
            if (e.x > this.camX + window.innerWidth || e.x + e.size < this.camX) continue;

            if (pBox.intersects(e.aabb)) {
                if (e.type === 'E') {
                    this.win();
                    return;
                } else {
                    this.die();
                    return;
                }
            }
        }
    }

    update(dt) {
        if (this.state === 'PLAYING') {
            this.player.update(dt, this.world.groundY);
            this.camX = this.player.x - CFG.WORLD.CAMERA_OFFSET_X;

            // Exhaust particles
            if (this.player.thrusting) {
                let nozzleX = this.player.x - this.player.w/2;
                let nozzleY = this.player.y;
                // Offset nozzle by rotation
                let ox = Math.cos(this.player.rot) * (-this.player.w/2) - Math.sin(this.player.rot) * 0;
                let oy = Math.sin(this.player.rot) * (-this.player.w/2) + Math.cos(this.player.rot) * 0;

                this.particles.emit(
                    this.player.x + ox - 5, this.player.y + oy,
                    -CFG.PHYSICS.SCROLL_SPEED + (Math.random()-0.5)*100, 
                    this.player.vy*0.2 + (Math.random()-0.5)*100,
                    0.3, 15, (Math.random() > 0.5 ? CFG.COLORS.PLAYER_SEC : '#fff'), 0
                );
            }

            this.checkCollisions();

            // UI Update
            let pct = Math.floor(Math.min(100, Math.max(0, (this.player.x / this.world.levelLength) * 100)));
            this.ui.bar.style.width = `${pct}%`;
            this.ui.pct.innerText = `${pct}%`;

        } else if (this.state === 'WON') {
            this.player.x += CFG.PHYSICS.SCROLL_SPEED * dt;
            this.camX = this.player.x - CFG.WORLD.CAMERA_OFFSET_X;
        }

        if (this.state !== 'PAUSED') {
            this.particles.update(dt);
        }
    }

    render() {
        if(this.state === 'MENU') {
            // Render menu background preview (auto scrolling)
            this.camX += 200 * CFG.TIMESTEP;
            if(this.world.entities.length === 0) this.world.load(this.currentLevelIdx);
        }

        this.world.drawBackground(this.ctx, this.camX);
        if (this.state === 'PLAYING' || this.state === 'WON' || this.state === 'PAUSED' || this.state === 'DEAD') {
            this.particles.draw(this.ctx, this.camX);
            this.player.draw(this.ctx, this.camX);
        }
    }

    loop(timestamp) {
        let dt = (timestamp - this.lastTime) / 1000;
        this.lastTime = timestamp;
        
        // Prevent death spiral on tab change
        if (dt > 0.25) dt = 0.25;
        
        this.accumulator += dt;
        while (this.accumulator >= CFG.TIMESTEP) {
            this.update(CFG.TIMESTEP);
            this.accumulator -= CFG.TIMESTEP;
        }
        
        this.render();
        requestAnimationFrame((t) => this.loop(t));
    }
}

window.onload = () => new Engine();
</script>
