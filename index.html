<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geometry Dash - Core Web Engine</title>
    <style>
        /* ====================================================================================================
           CORE STYLESHEET - GEOMETRY DASH AUTHENTIC UI
           ==================================================================================================== */
        @font-face {
            font-family: 'Pusab';
            src: local('Arial Black'), local('Impact');
        }

        :root {
            --gd-text: #ffffff;
            --text-stroke: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
            --shadow-drop: 4px 4px 0px rgba(0,0,0,0.5);
            
            --btn-green: #00ff00;
            --btn-green-dark: #008800;
            --btn-blue: #00ccff;
            --btn-blue-dark: #006688;
            --btn-red: #ff0000;
            --btn-red-dark: #880000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
            font-family: 'Pusab', 'Arial Black', sans-serif;
            color: var(--gd-text);
        }

        #game-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        /* ----------------------------------------------------------------------------------------------------
           CANVAS LAYERS
           ---------------------------------------------------------------------------------------------------- */
        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            /* Authentic pixelated rendering for sharp edges */
            image-rendering: pixelated; 
        }

        /* ----------------------------------------------------------------------------------------------------
           USER INTERFACE
           ---------------------------------------------------------------------------------------------------- */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            overflow: hidden;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease;
        }

        .screen.active {
            opacity: 1;
            visibility: visible;
        }

        /* MENU SPECIFICS */
        .title-text {
            font-size: 5vw;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffff00;
            text-shadow: var(--text-stroke), var(--shadow-drop);
            margin-bottom: 20px;
            text-align: center;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.8));
        }

        /* LEVEL SELECT CAROUSEL */
        .level-select-container {
            width: 90%;
            max-width: 900px;
            height: 450px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 6rem;
            cursor: pointer;
            text-shadow: var(--text-stroke);
            transition: transform 0.1s;
        }

        .nav-btn:active { transform: scale(0.8); }
        .nav-btn:hover { color: #ffff00; }

        .level-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            border: 6px solid #fff;
            border-radius: 15px;
            padding: 40px;
            margin: 0 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 10px 20px rgba(0,0,0,0.5);
            transition: background 0.3s;
        }

        .level-name {
            font-size: 3.5rem;
            color: #fff;
            text-shadow: var(--text-stroke);
            margin-bottom: 10px;
            text-align: center;
        }

        .level-difficulty {
            font-size: 1.8rem;
            color: #ffaa00;
            text-shadow: var(--text-stroke);
            margin-bottom: 30px;
        }

        .btn-play {
            background: var(--btn-green);
            color: #fff;
            font-family: 'Pusab', 'Arial Black', sans-serif;
            font-size: 3rem;
            padding: 20px 60px;
            border: 6px solid #000;
            border-radius: 20px;
            cursor: pointer;
            text-shadow: var(--text-stroke);
            box-shadow: inset 0 6px 0px rgba(255,255,255,0.5), inset 0 -6px 0px var(--btn-green-dark), 0 10px 10px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }

        .btn-play:active {
            transform: translateY(5px) scale(0.95);
            box-shadow: inset 0 2px 0px rgba(255,255,255,0.5), inset 0 -2px 0px var(--btn-green-dark), 0 5px 5px rgba(0,0,0,0.5);
        }

        /* HUD */
        #hud-screen {
            pointer-events: none;
            justify-content: flex-start;
            padding-top: 20px;
        }

        .progress-wrap {
            width: 70%;
            max-width: 600px;
            height: 20px;
            background: rgba(0,0,0,0.7);
            border: 4px solid #fff;
            border-radius: 10px;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--btn-green);
            box-shadow: inset 0 5px 0 rgba(255,255,255,0.5);
            transition: width 0.1s linear;
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            color: #fff;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }

        .attempt-counter {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5rem;
            color: rgba(255,255,255,0.8);
            text-shadow: 3px 3px 0 rgba(0,0,0,0.8);
            animation: fadeOut 3s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(-50%) scale(1); }
            10% { transform: translateX(-50%) scale(1.1); }
            20% { transform: translateX(-50%) scale(1); }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* PAUSE / DEATH / WIN SCREENS */
        .overlay-card {
            background: rgba(0,0,0,0.85);
            border: 6px solid #fff;
            border-radius: 20px;
            padding: 50px 80px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        .overlay-title {
            font-size: 4.5rem;
            margin-bottom: 40px;
            text-shadow: var(--text-stroke);
        }

        .btn-action {
            background: var(--btn-blue);
            color: #fff;
            font-family: inherit;
            font-size: 2.2rem;
            padding: 20px 50px;
            margin: 15px;
            border: 6px solid #000;
            border-radius: 15px;
            cursor: pointer;
            text-shadow: var(--text-stroke);
            box-shadow: inset 0 5px 0 rgba(255,255,255,0.4), inset 0 -5px 0 var(--btn-blue-dark);
            transition: transform 0.1s;
        }
        
        .btn-action:active { transform: scale(0.95); }
        .btn-danger { background: var(--btn-red); box-shadow: inset 0 5px 0 rgba(255,255,255,0.4), inset 0 -5px 0 var(--btn-red-dark); }

    </style>
</head>
<body>

    <div id="game-wrapper">
        <canvas id="game-canvas"></canvas>

        <div id="ui-layer">
            
            <div id="screen-menu" class="screen active">
                <h1 class="title-text">GEOMETRY DASH</h1>
                <div class="level-select-container">
                    <button class="nav-btn" id="btn-prev">&#9664;</button>
                    <div class="level-card" id="menu-card">
                        <div id="menu-level-name" class="level-name">STEREO MADNESS</div>
                        <div id="menu-level-diff" class="level-difficulty">EASY 1</div>
                        <button id="btn-start" class="btn-play">PLAY</button>
                    </div>
                    <button class="nav-btn" id="btn-next">&#9654;</button>
                </div>
            </div>

            <div id="screen-hud" class="screen">
                <div class="progress-wrap">
                    <div id="hud-bar" class="progress-fill"></div>
                    <div id="hud-pct" class="progress-text">0%</div>
                </div>
                <div id="hud-attempt" class="attempt-counter">ATTEMPT 1</div>
            </div>

            <div id="screen-death" class="screen">
                </div>

            <div id="screen-win" class="screen" style="background: rgba(0,0,0,0.7);">
                <div class="overlay-card">
                    <h2 class="overlay-title" style="color: #00ff00;">LEVEL COMPLETE!</h2>
                    <div id="win-stats" style="font-size: 2rem; margin-bottom: 40px; text-shadow: 2px 2px #000;">
                        ATTEMPTS: 1<br>JUMPS: 42
                    </div>
                    <button id="btn-next-level" class="btn-action">NEXT LEVEL</button>
                    <button id="btn-menu-win" class="btn-action btn-danger">MENU</button>
                </div>
            </div>

            <div id="screen-pause" class="screen" style="background: rgba(0,0,0,0.6);">
                <div class="overlay-card">
                    <h2 class="overlay-title" style="color: #fff;">PAUSED</h2>
                    <button id="btn-resume" class="btn-play" style="margin-bottom: 30px; display: block; width: 100%;">RESUME</button>
                    <button id="btn-menu-pause" class="btn-action btn-danger" style="display: block; width: 100%; margin: 0;">QUIT TO MENU</button>
                </div>
            </div>

        </div>
    </div>

/* ====================================================================================================
   2. PROCEDURAL SYNTHESIZER (WEB AUDIO API)
   ==================================================================================================== */
class SynthEngine {
    constructor() {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.masterGain = this.ctx.createGain();
        this.masterGain.gain.value = 0.3;
        this.masterGain.connect(this.ctx.destination);
        this.activeOscillators = [];
        this.isPlaying = false;
        this.startTime = 0;
        this.currentTrack = null;
        
        // Frequencies mapping
        this.notes = {
            'C2': 65.41, 'C#2': 69.30, 'D2': 73.42, 'D#2': 77.78, 'E2': 82.41, 'F2': 87.31, 'F#2': 92.50, 'G2': 98.00, 'G#2': 103.83, 'A2': 110.00, 'A#2': 116.54, 'B2': 123.47,

            'C4': 261.63, 'C#4': 277.18, 'D4': 293.66, 'D#4': 311.13, 'E4': 329.63, 'F4': 349.23, 'F#4': 369.99, 'G4': 392.00, 'G#4': 415.30, 'A4': 440.00, 'A#4': 466.16, 'B4': 493.88,
            'C5': 523.25, 'C#5': 554.37, 'D5': 587.33, 'D#5': 622.25, 'E5': 659.25, 'F5': 698.46, 'F#5': 739.99, 'G5': 783.99, 'G#5': 830.61, 'A5': 880.00, 'A#5': 932.33, 'B5': 987.77
        };
    }

    playNote(note, startTime, duration, type='square', detune=0) {
        if (!this.isPlaying) return;
        let osc = this.ctx.createOscillator();
        let gain = this.ctx.createGain();
        
        osc.type = type;
        osc.frequency.value = this.notes[note] || 440;
        osc.detune.value = detune;
        
        // Envelope
        gain.gain.setValueAtTime(0, startTime);
        gain.gain.linearRampToValueAtTime(0.5, startTime + 0.05);
        gain.gain.setValueAtTime(0.5, startTime + duration - 0.05);
        gain.gain.linearRampToValueAtTime(0, startTime + duration);

        osc.connect(gain);
        gain.connect(this.masterGain);
        
        osc.start(startTime);
        osc.stop(startTime + duration);
        this.activeOscillators.push(osc);
    }

    startTrack(trackData, bpm) {
        this.stop();
        if (this.ctx.state === 'suspended') this.ctx.resume();
        this.isPlaying = true;
        this.startTime = this.ctx.currentTime + 0.1;
        this.currentTrack = trackData;
        
        const bps = bpm / 60;
        const beatLen = 1 / bps;

        for(let note of trackData) {
            let n = note[0];
            let startBeat = note[1];
            let durBeat = note[2];
            let inst = note[3] || 'square';
            
            let tStart = this.startTime + (startBeat * beatLen);
            let tDur = durBeat * beatLen;
            this.playNote(n, tStart, tDur, inst);
        }
    }

    stop() {
        this.isPlaying = false;
        for(let osc of this.activeOscillators) {
            try { osc.stop(); } catch(e){}
            try { osc.disconnect(); } catch(e){}
        }
        this.activeOscillators = [];
    }
}

/* ====================================================================================================
   4. MATH & COLLISION LIBRARY
   ==================================================================================================== */
class MathUtils {
    static clamp(val, min, max) { return Math.min(Math.max(val, min), max); }
    static toRad(deg) { return deg * (Math.PI / 180); }
}

class AABB {
    constructor(x, y, w, h) {
        this.x = x; this.y = y; this.w = w; this.h = h;
    }
    intersects(other) {
        return (this.x < other.x + other.w && this.x + this.w > other.x &&
                this.y < other.y + other.h && this.y + this.h > other.y);
    }
}

/* ====================================================================================================
   5. PARTICLE ENGINE
   ==================================================================================================== */
class Particle {
    constructor() { this.active = false; }
    spawn(x, y, vx, vy, life, size, color) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.life = life; this.maxLife = life;
        this.size = size; this.startSize = size;
        this.color = color; this.active = true;
    }
    update(dt) {
        if (!this.active) return;
        this.x += this.vx * dt; this.y += this.vy * dt;
        this.life -= dt;
        if (this.life <= 0) this.active = false;
        else this.size = this.startSize * (this.life / this.maxLife);
    }
    draw(ctx, camX) {
        if (!this.active) return;
        let sx = this.x - camX;
        if (sx < -20 || sx > window.innerWidth + 20) return;
        ctx.globalAlpha = this.life / this.maxLife;
        ctx.fillStyle = this.color;
        ctx.fillRect(sx - this.size/2, this.y - this.size/2, this.size, this.size);
        ctx.globalAlpha = 1;
    }
}

class ParticleSystem {
    constructor(max = 2000) {
        this.pool = Array.from({length: max}, () => new Particle());
        this.idx = 0;
    }
    emit(x, y, vx, vy, life, size, color) {
        this.pool[this.idx].spawn(x, y, vx, vy, life, size, color);
        this.idx = (this.idx + 1) % this.pool.length;
    }
    burst(x, y, count, speed, life, size, color) {
        for(let i=0; i<count; i++) {
            let angle = Math.random() * Math.PI * 2;
            let vel = Math.random() * speed;
            this.emit(x, y, Math.cos(angle)*vel, Math.sin(angle)*vel, life*(0.5+Math.random()*0.5), size, color);
        }
    }
    update(dt) { for(let p of this.pool) p.update(dt); }
    draw(ctx, camX) { for(let p of this.pool) p.draw(ctx, camX); }
    clear() { for(let p of this.pool) p.active = false; }
}

/* ====================================================================================================
   6. GAME ENTITIES (PLAYER CUBE, BLOCKS, SPIKES)
   ==================================================================================================== */
class Player {
    constructor() {
        this.reset();
        this.trail = [];
    }
    
    reset(y = window.innerHeight/2) {
        this.x = 0; this.y = y;
        this.vy = 0; this.rot = 0;
        this.w = CFG.PLAYER.SIZE; this.h = CFG.PLAYER.SIZE;
        this.isJumping = false; this.onGround = false;
        this.dead = false; this.won = false;
        this.trail = []; this.jumps = 0; this.distance = 0;
    }

    getHitbox() {
        return new AABB(
            this.x - this.w/2 + CFG.PLAYER.HITBOX_PAD_X, 
            this.y - this.h/2 + CFG.PLAYER.HITBOX_PAD_Y_TOP, 
            this.w - CFG.PLAYER.HITBOX_PAD_X*2, 
            this.h - CFG.PLAYER.HITBOX_PAD_Y_TOP - CFG.PLAYER.HITBOX_PAD_Y_BOT
        );
    }

    jump() {
        if (this.onGround) {
            this.vy = CFG.PHYSICS.JUMP_VEL;
            this.onGround = false;
            this.jumps++;
        }
    }

    update(dt, speed, worldEntities) {
        if (this.dead || this.won) return;

        // Apply Gravity
        this.vy += CFG.PHYSICS.GRAVITY * dt;
        this.vy = MathUtils.clamp(this.vy, -9999, CFG.PHYSICS.TERM_VEL_FALL);

        // Store old position for collision resolution
        let oldY = this.y;
        this.y += this.vy * dt;
        this.onGround = false;

        // Y-Axis Collision
        let pBox = this.getHitbox();
        for (let e of worldEntities) {
            if (e.x > this.x + 100 || e.x + e.size < this.x - 100) continue; // Culling
            if (e.isSolid && pBox.intersects(e.aabb)) {
                if (this.vy > 0 && oldY + this.h/2 <= e.aabb.y + 10) { 
                    // Hit top of block
                    this.y = e.aabb.y - this.h/2;
                    this.vy = 0;
                    this.onGround = true;
                    // Snap rotation to nearest 90 degrees
                    let snap = Math.round(this.rot / 90) * 90;
                    this.rot = snap;
                } else if (this.vy < 0 && oldY - this.h/2 >= e.aabb.y + e.aabb.h - 10) {
                    // Hit bottom of block (ceiling)
                    this.y = e.aabb.y + e.aabb.h + this.h/2;
                    this.vy = 0;
                }
            }
        }

        // X-Axis Update
        let oldX = this.x;
        this.x += speed * dt;
        this.distance = this.x;
        
        // Rotation (180 deg per jump approx)
        if (!this.onGround) {
            this.rot += CFG.PLAYER.ROT_SPEED * dt;
        }

        // X-Axis Collision (Wall crash or Spikes)
        pBox = this.getHitbox();
        for (let e of worldEntities) {
            if (e.x > this.x + 100 || e.x + e.size < this.x - 100) continue;
            if (pBox.intersects(e.aabb)) {
                if (e.isSolid) {
                    // Wall crash
                    this.dead = true;
                    this.x = oldX; // visually stop at wall
                    return;
                } else if (e.isLethal) {
                    this.dead = true;
                    return;
                } else if (e.isEnd) {
                    this.won = true;
                    return;
                }
            }
        }

        // Trail
        if (this.trail.length % 3 === 0) { // Throttle trail size
            this.trail.unshift({x: this.x, y: this.y, rot: this.rot});
            if (this.trail.length > 8) this.trail.pop();
        } else {
            this.trail.unshift(this.trail[0]); // Duplicate last for smooth fade
        }
    }

    draw(ctx, camX) {
        if (this.dead) return;
        let screenX = this.x - camX;

        // Draw Ghost Trail
        for (let i = 0; i < this.trail.length; i++) {
            if (!this.trail[i]) continue;
            let t = this.trail[i];
            ctx.save();
            ctx.translate(t.x - camX, t.y);
            ctx.rotate(MathUtils.toRad(t.rot));
            ctx.globalAlpha = 1 - (i / this.trail.length);
            ctx.fillStyle = CFG.COLORS.P1;
            ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
            ctx.restore();
        }
        ctx.globalAlpha = 1;

        // Draw Main Cube
        ctx.save();
        ctx.translate(screenX, this.y);
        ctx.rotate(MathUtils.toRad(this.rot));

        // Black outline
        ctx.fillStyle = '#000';
        ctx.fillRect(-this.w/2 - 2, -this.h/2 - 2, this.w + 4, this.h + 4);
        
        // White border
        ctx.fillStyle = '#fff';
        ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
        
        // Primary Color Base
        ctx.fillStyle = CFG.COLORS.P1;
        ctx.fillRect(-this.w/2 + 3, -this.h/2 + 3, this.w - 6, this.h - 6);

        // Secondary Color Details (GD Classic Cube Face)
        ctx.fillStyle = CFG.COLORS.P2;
        // Inner square
        ctx.fillRect(-this.w/4, -this.h/4, this.w/2, this.h/2);
        
        // Eyes/Face details
        ctx.fillStyle = '#000';
        ctx.fillRect(-10, -10, 6, 6);
        ctx.fillRect(4, -10, 6, 6);
        ctx.fillRect(-10, 4, 20, 4);

        ctx.restore();
    }
}

class Entity {
    constructor(type, x, y, size) {
        this.type = type; 
        this.x = x; this.y = y; this.size = size;
        this.isSolid = false;
        this.isLethal = false;
        this.isEnd = false;
        
        if (type === 'X' || type === 'P') {
            this.isSolid = true;
            this.aabb = new AABB(x, y, size, size);
        } else if (type === 'S') {
            this.isSolid = true;
            this.aabb = new AABB(x, y + size/2, size, size/2);
        } else if (['^', 'v', '<', '>'].includes(type)) {
            this.isLethal = true;
            let pad = size * 0.3; // Very forgiving spike hitboxes
            this.aabb = new AABB(x + pad, y + pad, size - pad*2, size - pad*2);
        } else if (type === 'E') {
            this.isEnd = true;
            this.aabb = new AABB(x, 0, size, window.innerHeight);
        }
    }

    draw(ctx, camX) {
        let screenX = this.x - camX;
        if (screenX < -this.size || screenX > window.innerWidth) return;

        ctx.save();
        ctx.translate(screenX, this.y);

        if (this.type === 'X') {
            // GD Standard Block
            ctx.fillStyle = '#000'; 
            ctx.fillRect(0, 0, this.size, this.size);
            ctx.fillStyle = '#fff'; 
            ctx.fillRect(2, 2, this.size-4, this.size-4);
            ctx.fillStyle = 'rgba(0,0,0,0.5)'; // Darkened inner
            ctx.fillRect(4, 4, this.size-8, this.size-8);
            
            // Corner details
            ctx.fillStyle = '#fff';
            ctx.fillRect(6, 6, 4, 4); ctx.fillRect(this.size-10, 6, 4, 4);
            ctx.fillRect(6, this.size-10, 4, 4); ctx.fillRect(this.size-10, this.size-10, 4, 4);

        } else if (this.type === 'P') {
            // Platform (just top line)
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, this.size, 4);
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.fillRect(0, 4, this.size, this.size-4);

        } else if (['^', 'v', '<', '>'].includes(this.type)) {
            // Spikes (White outline, black core)
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            if (this.type === '^') { ctx.moveTo(this.size/2, 0); ctx.lineTo(this.size, this.size); ctx.lineTo(0, this.size); }
            else if (this.type === 'v') { ctx.moveTo(this.size/2, this.size); ctx.lineTo(this.size, 0); ctx.lineTo(0, 0); }
            else if (this.type === '>') { ctx.moveTo(this.size, this.size/2); ctx.lineTo(0, 0); ctx.lineTo(0, this.size); }
            else if (this.type === '<') { ctx.moveTo(0, this.size/2); ctx.lineTo(this.size, 0); ctx.lineTo(this.size, this.size); }
            ctx.fill();

            ctx.fillStyle = '#000';
            ctx.beginPath();
            let p = 4;
            if (this.type === '^') { ctx.moveTo(this.size/2, p*2); ctx.lineTo(this.size-p, this.size-p); ctx.lineTo(p, this.size-p); }
            else if (this.type === 'v') { ctx.moveTo(this.size/2, this.size-p*2); ctx.lineTo(this.size-p, p); ctx.lineTo(p, p); }
            else if (this.type === '>') { ctx.moveTo(this.size-p*2, this.size/2); ctx.lineTo(p, p); ctx.lineTo(p, this.size-p); }
            else if (this.type === '<') { ctx.moveTo(p*2, this.size/2); ctx.lineTo(this.size-p, p); ctx.lineTo(this.size-p, this.size-p); }
            ctx.fill();
        } else if (this.type === 'E') {
            // End Goal Line
            ctx.fillStyle = 'rgba(0, 255, 0, 0.4)';
            ctx.fillRect(0, -window.innerHeight, this.size, window.innerHeight*2);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 6;
            ctx.beginPath(); ctx.moveTo(this.size/2, -window.innerHeight); ctx.lineTo(this.size/2, window.innerHeight); ctx.stroke();
        }

        ctx.restore();
    }
}

/* ====================================================================================================
   7. WORLD & RENDERING
   ==================================================================================================== */
class World {
    constructor() {
        this.entities = [];
        this.levelLength = 0;
        this.groundY = 0;
        this.bgColor = '#000';
        this.groundColor = '#000';
        this.scrollSpeed = CFG.PHYSICS.SCROLL_SPEED;
    }

    load(index) {
        this.entities = [];
        let data = LEVEL_DATABASE[index];
        this.bgColor = data.bg;
        this.groundColor = data.ground;
        this.scrollSpeed = data.speed;

        let grid = CFG.WORLD.BLOCK_SIZE;
        let mapH = data.layout.length * grid;
        this.groundY = window.innerHeight - CFG.WORLD.GROUND_HEIGHT;
        
        // Calculate Y start so bottom of array sits exactly on the ground
        let startY = this.groundY - mapH; 
        
        // Base ground solid
        let groundEnt = new Entity('X', -9999, this.groundY, 999999);
        groundEnt.aabb = new AABB(-9999, this.groundY, 999999, window.innerHeight);
        this.entities.push(groundEnt);

        let maxX = 0;
        for (let r = 0; r < data.layout.length; r++) {
            for (let c = 0; c < data.layout[r].length; c++) {
                let char = data.layout[r][c];
                let x = c * grid;
                let y = startY + r * grid;
                if (char !== '.') {
                    this.entities.push(new Entity(char, x, y, grid));
                    if (x > maxX) maxX = x;
                }
            }
        }
        this.levelLength = maxX;
    }

    draw(ctx, camX) {
        // Flat BG
        ctx.fillStyle = this.bgColor;
        ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

        // Faint Grid
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
        ctx.lineWidth = 1;
        let gX = (camX * 0.4) % CFG.WORLD.BLOCK_SIZE;
        for(let x = -gX; x < window.innerWidth; x += CFG.WORLD.BLOCK_SIZE) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, this.groundY); ctx.stroke();
        }
        for(let y = this.groundY % CFG.WORLD.BLOCK_SIZE; y > 0; y -= CFG.WORLD.BLOCK_SIZE) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(window.innerWidth, y); ctx.stroke();
        }

        // Entities (Draw back to front)
        for(let e of this.entities) {
            if(e.type !== 'X' && e.type !== 'E') e.draw(ctx, camX);
        }
        for(let e of this.entities) {
            if(e.type === 'X' || e.type === 'E') e.draw(ctx, camX);
        }

        // The Ground rendering
        ctx.fillStyle = this.groundColor;
        ctx.fillRect(0, this.groundY, window.innerWidth, window.innerHeight - this.groundY);
        
        // Ground White Line
        ctx.fillStyle = CFG.COLORS.LINE;
        ctx.fillRect(0, this.groundY - 3, window.innerWidth, 3);
        ctx.fillStyle = '#000';
        ctx.fillRect(0, this.groundY, window.innerWidth, 3);

        // Scrolling Ground Pattern
        ctx.strokeStyle = 'rgba(0,0,0,0.4)';
        ctx.lineWidth = 4;
        let groundOffsetX = camX % CFG.WORLD.BLOCK_SIZE;
        for(let x = -groundOffsetX; x < window.innerWidth; x += CFG.WORLD.BLOCK_SIZE) {
            ctx.strokeRect(x, this.groundY, CFG.WORLD.BLOCK_SIZE, CFG.WORLD.BLOCK_SIZE);
        }
    }
}

/* ====================================================================================================
   8. MAIN ENGINE & STATE MACHINE
   ==================================================================================================== */
class Engine {
    constructor() {
        this.canvas = document.getElementById('game-canvas');
        this.ctx = this.canvas.getContext('2d', { alpha: false });
        
        this.world = new World();
        this.player = new Player();
        this.particles = new ParticleSystem(2500);
        this.audio = new SynthEngine();
        
        this.state = 'MENU'; 
        this.camX = 0;
        this.attempts = 1;
        this.currentLevelIdx = 0;
        
        this.lastTime = performance.now();
        this.accumulator = 0;

        this.initDOM();
        this.resize();
        window.addEventListener('resize', () => this.resize());
        this.setupInputs();

        this.updateMenuUI();
        requestAnimationFrame((t) => this.loop(t));
    }

    initDOM() {
        this.ui = {
            menu: document.getElementById('screen-menu'),
            hud: document.getElementById('screen-hud'),
            death: document.getElementById('screen-death'),
            win: document.getElementById('screen-win'),
            pause: document.getElementById('screen-pause'),
            bar: document.getElementById('hud-bar'),
            pct: document.getElementById('hud-pct'),
            attempt: document.getElementById('hud-attempt'),
            lvlName: document.getElementById('menu-level-name'),
            lvlDiff: document.getElementById('menu-level-diff'),
            menuCard: document.getElementById('menu-card'),
            winStats: document.getElementById('win-stats')
        };

        document.getElementById('btn-prev').onclick = () => this.changeLevel(-1);
        document.getElementById('btn-next').onclick = () => this.changeLevel(1);
        document.getElementById('btn-start').onclick = () => this.startLevel();
        document.getElementById('btn-resume').onclick = () => this.togglePause();
        document.getElementById('btn-menu-pause').onclick = () => this.goMenu();
        document.getElementById('btn-menu-win').onclick = () => this.goMenu();
        document.getElementById('btn-next-level').onclick = () => {
            this.currentLevelIdx = (this.currentLevelIdx + 1) % LEVEL_DATABASE.length;
            this.startLevel();
        };
    }

    resize() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
    }

    setScreen(screenObj) {
        Object.values(this.ui).forEach(el => {
            if(el.classList && el.classList.contains('screen')) el.classList.remove('active');
        });
        if(screenObj) screenObj.classList.add('active');
    }

    changeLevel(dir) {
        this.currentLevelIdx += dir;
        if(this.currentLevelIdx < 0) this.currentLevelIdx = LEVEL_DATABASE.length - 1;
        if(this.currentLevelIdx >= LEVEL_DATABASE.length) this.currentLevelIdx = 0;
        this.updateMenuUI();
    }

    updateMenuUI() {
        let d = LEVEL_DATABASE[this.currentLevelIdx];
        this.ui.lvlName.innerText = d.name;
        this.ui.lvlDiff.innerText = `${d.difficulty} ${this.currentLevelIdx + 1}`;
        this.ui.menu.style.background = `radial-gradient(circle, ${d.bg} 0%, #000 100%)`;
        this.ui.menuCard.style.borderColor = d.bg;
    }

    goMenu() {
        this.audio.stop();
        this.state = 'MENU';
        this.setScreen(this.ui.menu);
        this.updateMenuUI();
    }

    startLevel() {
        this.attempts = 1;
        this.resetRun();
        
        // Start Audio
        if(AUDIO_TRACKS[this.currentLevelIdx]) {
            let track = AUDIO_TRACKS[this.currentLevelIdx];
            this.audio.startTrack(track.notes, track.bpm);
        }
    }

    resetRun() {
        this.world.load(this.currentLevelIdx);
        this.player.reset(this.world.groundY - CFG.PLAYER.SIZE/2);
        this.camX = this.player.x - CFG.WORLD.CAMERA_OFFSET_X;
        this.particles.clear();
        this.state = 'PLAYING';
        this.setScreen(this.ui.hud);
        
        this.ui.attempt.innerText = `ATTEMPT ${this.attempts}`;
        this.ui.attempt.style.animation = 'none';
        void this.ui.attempt.offsetWidth; 
        this.ui.attempt.style.animation = 'fadeOut 3s forwards';
        
        // Restart audio if it stopped
        if(AUDIO_TRACKS[this.currentLevelIdx] && !this.audio.isPlaying && this.attempts > 1) {
             let track = AUDIO_TRACKS[this.currentLevelIdx];
             this.audio.startTrack(track.notes, track.bpm);
        }
    }

    setupInputs() {
        const handleDown = (e) => {
            if(e.target.tagName === 'BUTTON') return;
            if(this.state === 'PLAYING') {
                this.player.jump();
            }
        };

        window.addEventListener('mousedown', handleDown);
        window.addEventListener('touchstart', (e) => {
            if(e.target.tagName !== 'BUTTON') e.preventDefault();
            handleDown(e);
        }, {passive: false});

        window.addEventListener('keydown', (e) => {
            if(e.code === 'Space' || e.code === 'ArrowUp') handleDown(e);
            if(e.code === 'Escape' && this.state === 'PLAYING') this.togglePause();
        });
    }

    togglePause() {
        if(this.state === 'PLAYING') {
            this.state = 'PAUSED';
            this.setScreen(this.ui.pause);
            this.audio.ctx.suspend();
        } else if (this.state === 'PAUSED') {
            this.state = 'PLAYING';
            this.setScreen(this.ui.hud);
            this.audio.ctx.resume();
        }
    }

    die() {
        this.state = 'DEAD';
        this.player.dead = true;
        this.setScreen(this.ui.death);
        this.audio.stop();
        
        // Authentic GD Death Explosion
        this.particles.burst(this.player.x, this.player.y, 100, 1500, 1.0, 15, CFG.COLORS.P1);
        this.particles.burst(this.player.x, this.player.y, 50, 800, 0.8, 10, CFG.COLORS.P2);
        this.particles.burst(this.player.x, this.player.y, 30, 400, 0.5, 8, '#ffffff');
        
        // Auto Restart
        setTimeout(() => {
            if(this.state === 'DEAD') {
                this.attempts++;
                this.resetRun();
            }
        }, 1000);
    }

    win() {
        this.state = 'WON';
        this.player.won = true;
        this.audio.stop();
        this.ui.winStats.innerHTML = `ATTEMPTS: ${this.attempts}<br>JUMPS: ${this.player.jumps}`;
        this.setScreen(this.ui.win);
    }

    update(dt) {
        if (this.state === 'PLAYING') {
            this.player.update(dt, this.world.scrollSpeed, this.world.entities);
            this.camX = this.player.x - CFG.WORLD.CAMERA_OFFSET_X;
            
            // Ground dust particles
            if(this.player.onGround && Math.random() > 0.5) {
                this.particles.emit(
                    this.player.x - this.player.w/2, this.player.y + this.player.h/2,
                    -this.world.scrollSpeed * 0.5, -Math.random()*100,
                    0.4, 8, '#ffffff'
                );
            }

            // Sync check for death/win applied from player
            if(this.player.dead && this.state !== 'DEAD') this.die();
            if(this.player.won && this.state !== 'WON') this.win();

            // UI
            let pct = Math.floor(Math.min(100, Math.max(0, (this.player.x / this.world.levelLength) * 100)));
            this.ui.bar.style.width = `${pct}%`;
            this.ui.pct.innerText = `${pct}%`;

        } else if (this.state === 'WON') {
            this.player.x += this.world.scrollSpeed * dt;
            this.camX = this.player.x - CFG.WORLD.CAMERA_OFFSET_X;
        }

        if (this.state !== 'PAUSED') {
            this.particles.update(dt);
        }
    }

    render() {
        if(this.state === 'MENU') {
            this.camX += 250 * CFG.TIMESTEP;
            if(this.world.entities.length === 0) this.world.load(this.currentLevelIdx);
        }

        this.world.draw(this.ctx, this.camX);
        if (this.state === 'PLAYING' || this.state === 'WON' || this.state === 'PAUSED' || this.state === 'DEAD') {
            this.player.draw(this.ctx, this.camX);
            this.particles.draw(this.ctx, this.camX);
        }
    }

    loop(timestamp) {
        let dt = (timestamp - this.lastTime) / 1000;
        this.lastTime = timestamp;
        
        if (dt > 0.1) dt = 0.1; // Prevent massive jumps on lag
        
        this.accumulator += dt;
        while (this.accumulator >= CFG.TIMESTEP) {
            this.update(CFG.TIMESTEP);
            this.accumulator -= CFG.TIMESTEP;
        }
        
        this.render();
        requestAnimationFrame((t) => this.loop(t));
    }
}

// Bootstrap
window.onload = () => new Engine();
</script>
